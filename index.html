<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>Philips Service Navigator — Service Support Assistant</title>
<style>
 :root{
  --bg:#eef3f8;
  --panel:#ffffff;
  --brand:#0281c3;
  --brand-dark:#026da5;
  --brand-soft:#e6f5fc;
  --ink:#101828;
  --muted:#667085;
  --line:#e5e7eb;
  --bot:#f8fafc;
  --user:#0281c3;
  --good:#0f766e;
  --good-bg:#ecfdf5;
  --warn:#b45309;
  --warn-bg:#fffbeb;
  --danger:#b42318;
  --danger-bg:#fff1f3;
  --purple:#6941c6;
  --purple-bg:#f4f3ff;
  --shadow:0 22px 60px rgba(2,129,195,.18);
 }
 *{box-sizing:border-box}
 body{
  margin:0;
  font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",Roboto,Helvetica,Arial,sans-serif;
  background:
   radial-gradient(circle at 12% 10%,rgba(2,129,195,.13),transparent 34%),
   linear-gradient(135deg,#dfeaf2,#eef3f8 54%,#f7fbff);
  min-height:100vh;
  color:var(--ink);
  display:flex;
  justify-content:center;
  padding:18px;
 }
 .shell{width:100%;max-width:760px;display:block;}
 .app{background:var(--panel);border-radius:26px;box-shadow:var(--shadow);overflow:hidden;border:1px solid rgba(2,129,195,.08)}
 .app{height:min(930px,96vh);display:flex;flex-direction:column;min-width:0}
 header{
  background:linear-gradient(135deg,var(--brand),var(--brand-dark));
  color:#fff;
  padding:17px 18px 14px;
 }
 .topbar{display:flex;align-items:center;gap:12px}
 .logo{
  width:70px;height:46px;border-radius:14px;background:rgba(255,255,255,.14);
  display:flex;align-items:center;justify-content:center;flex-shrink:0;overflow:hidden;border:0px solid rgba(255,255,255,.2);
 }
 .logo img{width:100%;height:100%;object-fit:cover;display:block;filter:saturate(1.02)}
 header h1{font-size:17px;margin:0;font-weight:850;letter-spacing:.2px}
 header p{margin:3px 0 0;font-size:12px;opacity:.9;line-height:1.35}
 .status{margin-left:auto;display:flex;align-items:center;gap:7px;font-size:11px;opacity:.95;font-weight:750;background:rgba(255,255,255,.13);border:1px solid rgba(255,255,255,.2);padding:6px 9px;border-radius:999px;white-space:nowrap}
 .dot{width:8px;height:8px;border-radius:50%;background:#7CFFB2;box-shadow:0 0 8px #7CFFB2}
 .ctx{margin-top:12px;display:flex;gap:8px;flex-wrap:wrap;min-height:0}
 .ctx:empty{display:none}
 .ctx-pill{display:inline-flex;align-items:center;gap:6px;background:rgba(255,255,255,.16);border:1px solid rgba(255,255,255,.22);color:#fff;font-size:11px;font-weight:800;padding:5px 10px;border-radius:999px;}
 .ctx-pill span{opacity:.76;font-weight:650}
 .scope{background:#fff;border-bottom:1px solid var(--line);padding:12px 14px 11px;}
 .scope-head{display:flex;align-items:center;justify-content:space-between;margin-bottom:10px;gap:12px}
 .scope h2{margin:0;font-size:13px;color:#101828}
 .scope small{color:var(--muted);font-size:11px;text-align:right}
 .devices{display:flex;gap:10px;overflow-x:auto;padding:1px 1px 3px;scrollbar-width:thin}
 .device{min-width:220px;border:1px solid var(--line);border-radius:17px;background:#fff;overflow:hidden;cursor:pointer;transition:.16s;}
 .device.active{border-color:var(--brand);box-shadow:0 0 0 3px var(--brand-soft)}
 .device:hover{transform:translateY(-1px);box-shadow:0 10px 22px rgba(15,23,42,.08)}
 .device-visual{height:102px;background:#fff;display:flex;align-items:center;justify-content:center;overflow:hidden;}
 .device-visual img{width:100%;height:100%;object-fit:cover;display:block}
 .device-body{padding:10px 11px 11px}
 .device-name{font-size:12.5px;font-weight:850;line-height:1.25;margin-bottom:4px}
 .device-desc{font-size:10.8px;color:var(--muted);line-height:1.35;min-height:40px;overflow:hidden}
 .tag{display:inline-flex;align-items:center;gap:5px;font-size:10px;font-weight:850;margin-top:8px;color:var(--good);background:var(--good-bg);padding:4px 8px;border-radius:999px}
 .logic-strip{display:grid;grid-template-columns:repeat(4,minmax(0,1fr));gap:8px;padding:10px 14px;background:#f8fbfd;border-bottom:1px solid var(--line)}
 .logic-card{border:1px solid #e6eef5;border-radius:14px;background:#fff;padding:9px 10px;min-width:0}
 .logic-card b{display:block;font-size:11px;margin-bottom:3px;color:#344054}.logic-card span{display:block;font-size:10.5px;color:var(--muted);line-height:1.35}
 #chat{flex:1;overflow-y:auto;padding:16px;display:flex;flex-direction:column;gap:12px;background:var(--bg);}
 .msg{max-width:88%;padding:12px 14px;border-radius:18px;font-size:14.1px;line-height:1.5;white-space:pre-wrap;word-wrap:break-word;animation:pop .18s ease;}
 @keyframes pop{from{opacity:0;transform:translateY(6px)}to{opacity:1;transform:none}}
 .bot{align-self:flex-start;background:var(--bot);color:var(--ink);border:1px solid #edf2f7;border-bottom-left-radius:6px}
 .user{align-self:flex-end;background:var(--user);color:#fff;border-bottom-right-radius:6px}
 .msg b{font-weight:850}
 .note,.success,.danger,.ai-box{display:block;border-radius:12px;padding:9px 10px;margin-top:8px;font-size:12px;line-height:1.45;white-space:normal}
 .note{background:var(--warn-bg);border:1px solid #fed7aa;color:#92400e}
 .success{background:var(--good-bg);border:1px solid #99f6e4;color:#115e59}
 .danger{background:var(--danger-bg);border:1px solid #fda29b;color:var(--danger)}
 .ai-box{background:var(--purple-bg);border:1px solid #d9d6fe;color:#42307d}
 .chips{display:flex;flex-wrap:wrap;gap:8px;padding:0 16px 9px;background:var(--bg)}
 .chip{background:#fff;border:1px solid var(--brand);color:var(--brand-dark);padding:7px 12px;border-radius:20px;font-size:12.2px;cursor:pointer;transition:.15s;font-weight:780;}
 .chip:hover{background:var(--brand);color:#fff;transform:translateY(-1px)}
 .chip.secondary{border-color:#d0d5dd;color:#344054}.chip.secondary:hover{background:#344054;color:#fff}
 .chip.good-chip{border-color:#0f766e;color:#0f766e}.chip.good-chip:hover{background:#0f766e;color:#fff}
 .chip.danger-chip{border-color:#f04438;color:#b42318}.chip.danger-chip:hover{background:#b42318;color:#fff}
 .chip.purple-chip{border-color:#7f56d9;color:#6941c6}.chip.purple-chip:hover{background:#6941c6;color:#fff}
 .typing{align-self:flex-start;background:var(--bot);padding:13px 16px;border-radius:16px;border-bottom-left-radius:6px;display:flex;gap:4px;border:1px solid #edf2f7}
 .typing span{width:7px;height:7px;background:#9bb0bd;border-radius:50%;animation:bounce 1.2s infinite}.typing span:nth-child(2){animation-delay:.2s}.typing span:nth-child(3){animation-delay:.4s}
 @keyframes bounce{0%,60%,100%{transform:translateY(0);opacity:.5}30%{transform:translateY(-5px);opacity:1}}
 footer{padding:12px;border-top:1px solid var(--line);background:#fff}.inputbar{display:flex;gap:8px;align-items:flex-end}
 #input{flex:1;border:1px solid var(--line);border-radius:23px;padding:11px 15px;font-size:14.3px;resize:none;max-height:112px;outline:none;font-family:inherit;line-height:1.42;}
 #input:focus{border-color:var(--brand);box-shadow:0 0 0 3px var(--brand-soft)}
 #send{background:var(--brand);color:#fff;border:none;width:44px;height:44px;border-radius:50%;font-size:19px;cursor:pointer;flex-shrink:0;transition:.15s;display:flex;align-items:center;justify-content:center;}
 #send:hover{background:var(--brand-dark);transform:translateY(-1px)}
 .disclaimer{font-size:10.5px;color:var(--muted);text-align:center;margin-top:8px;line-height:1.4}
 .case-panel{height:min(930px,96vh);display:flex;flex-direction:column;background:#fff;position:sticky;top:18px}
 .case-head{padding:17px 16px 13px;background:#101828;color:#fff}.case-head h2{margin:0;font-size:16px}.case-head p{margin:4px 0 0;font-size:11.5px;color:#d0d5dd;line-height:1.4}
 .panel-body{padding:14px;overflow:auto;display:flex;flex-direction:column;gap:12px}
 .section-title{font-size:11px;font-weight:850;color:#475467;text-transform:uppercase;letter-spacing:.06em;margin-bottom:7px}
 .role-grid{display:grid;grid-template-columns:1fr;gap:7px}.role-btn{border:1px solid var(--line);background:#fff;border-radius:13px;padding:10px 11px;text-align:left;cursor:pointer;transition:.15s}.role-btn b{display:block;font-size:12px;color:#101828}.role-btn span{display:block;font-size:10.5px;color:var(--muted);margin-top:2px;line-height:1.35}.role-btn.active{border-color:var(--brand);background:var(--brand-soft);box-shadow:0 0 0 2px rgba(2,129,195,.08)}
 .kv{display:grid;grid-template-columns:94px 1fr;gap:7px 8px;font-size:12px}.kv .k{color:var(--muted)}.kv .v{font-weight:760;color:#101828;min-width:0;word-break:break-word}
 .badge{display:inline-flex;align-items:center;gap:5px;border-radius:999px;padding:4px 8px;font-size:10.5px;font-weight:850;background:#f2f4f7;color:#344054;border:1px solid #eaecf0}.badge.good{background:var(--good-bg);border-color:#99f6e4;color:#115e59}.badge.warn{background:var(--warn-bg);border-color:#fed7aa;color:#92400e}.badge.danger{background:var(--danger-bg);border-color:#fda29b;color:#b42318}.badge.purple{background:var(--purple-bg);border-color:#d9d6fe;color:#42307d}
 .support{border:1px solid var(--line);border-radius:15px;background:#f8fafc;padding:12px}#support{width:100%;min-height:150px;border:1px solid #d0d5dd;border-radius:12px;padding:10px;font-size:11.5px;line-height:1.45;font-family:ui-monospace,SFMono-Regular,Menlo,Monaco,Consolas,"Liberation Mono",monospace;resize:vertical;background:#fff;color:#344054}.panel-actions{display:flex;gap:7px;margin-top:8px}.panel-actions button{flex:1;border:none;border-radius:11px;padding:9px 10px;font-weight:800;font-size:11.5px;cursor:pointer}.copy{background:var(--brand);color:#fff}.reset{background:#eef2f6;color:#344054}.mini{font-size:10.8px;color:var(--muted);line-height:1.45;margin:0}.source-card{border:1px solid var(--line);border-radius:15px;padding:12px;background:#fff}.source-card ul{margin:7px 0 0;padding-left:17px;color:#475467;font-size:11.5px;line-height:1.5}.toast{position:fixed;right:22px;bottom:22px;background:#101828;color:#fff;padding:10px 12px;border-radius:12px;font-size:12px;box-shadow:0 12px 30px rgba(16,24,40,.25);opacity:0;transform:translateY(8px);transition:.18s}.toast.show{opacity:1;transform:none}
 @media (max-width:980px){body{padding:10px}.shell{grid-template-columns:1fr}.case-panel{height:auto;position:static}.logic-strip{grid-template-columns:repeat(2,minmax(0,1fr))}.app{height:92vh}.status{display:none}}
 @media (max-width:560px){.logic-strip{grid-template-columns:1fr}.device{min-width:205px}.msg{max-width:94%}.logo{width:58px}.scope small{display:none}}
</style>
</head>
<body>
<div class="shell">
 <main class="app">
  <header>
   <div class="topbar">
    <div class="logo"><img src="https://kreafolk.com/cdn/shop/articles/philips-logo-design-history-and-evolution-kreafolk_f1fc2da1-f530-4f3c-b656-b0bd1bd55a23.jpg?v=1771570750&width=2048" alt="Philips logo"></div>
    <div>
     <h1>Philips Service Navigator</h1>
     <p>CPAP setup, troubleshooting, and escalation assistant</p>
    </div>
    <div class="status"><span class="dot"></span>Service mode</div>
   </div>
   <div class="ctx" id="ctx"></div>
  </header>

  <section class="scope">
   <div class="scope-head">
    <h2>Know more about</h2>
    <small>Tap a device or ask naturally</small>
   </div>
   <div class="devices" id="devices"></div>
  </section>

  <div id="chat"></div>
  <div class="chips" id="chips"></div>

  <footer>
   <div class="inputbar">
    <textarea id="input" rows="1" placeholder="Ask: DS2 has gurgling noise, mask leaking, app not syncing, pressure feels too strong…"></textarea>
    <button id="send" title="Send">➤</button>
   </div>
   <div class="disclaimer">Clinical or unsafe cases are routed to support.</div>
  </footer>
 </main>
</div>

<script>
const chat = document.getElementById('chat');
const chipsEl = document.getElementById('chips');
const input = document.getElementById('input');
const sendBtn = document.getElementById('send');
const devicesEl = document.getElementById('devices');
const ctxEl = document.getElementById('ctx');
const rolesEl = document.getElementById('roles');
const toast = document.getElementById('toast');

const roleOptions = [
 {id:'field-agent', name:'Field agent', desc:'Needs deployment steps, quick checks, and escalation notes.'},
 {id:'sleep-consultant', name:'Sleep consultant', desc:'Needs mask guidance, comfort coaching, and patient-friendly explanation.'},
 {id:'end-user', name:'Patient / user', desc:'Needs simple instructions and clear safety boundaries.'}
];

const devices = [
 {
  id:'dreamstation-1',
  image:'https://www.philips.com.sg/c-dam/b2c/master/experience/hs/sleep-apnea-therapy/sleep-apnea-machines/dreamstation-intro.jpg',
  name:'DreamStation 1 Auto CPAP',
  short:'Dial/button controls, side-loading humidifier, reusable blue filter, optional modem/Bluetooth accessory.',
 
  notes:'DreamStation 1 uses front dial/button navigation, a side-loading humidifier, and a reusable blue filter with optional disposable ultra-fine filter.'
 },
 {
  id:'dreamstation-2',
  image:'https://images.philips.com/is/image/philipsconsumer/49159a1299154c0ebe37ac62013820b0?$jpglarge$&wid=420&hei=360',
  name:'DreamStation 2 Auto CPAP',
  short:'Touchscreen controls, top drop-in humidifier, rear heated tube port, built-in Bluetooth/cellular on supported models.',

  notes:'DreamStation 2 uses a colour touchscreen, a top drop-in humidifier, a rear tube connection, and a single disposable ultra-fine filter.'
 }
];

const kb = {
 overview:{
  title:'Device overview',
  aliases:['overview','about','parts','what is','device parts','component'],
  confidence:'High',
  probable:['New deployment or orientation request'],
  answer:`**Service answer — device overview**
A DreamStation Auto CPAP provides positive airway pressure during sleep. For service support, the important parts are:
1. Therapy device / blower unit.
2. Power adapter and wall socket.
3. Air tubing, standard or heated.
4. Mask, cushion, frame, and headgear.
5. Humidifier water chamber, if used.
6. Air inlet filter.

[note]Confirm the exact model before giving physical setup steps, because DreamStation 1 and DreamStation 2 differ in controls, humidifier loading, and filter type.[/note]`,
  escalateIf:['The user asks for prescription settings or clinical interpretation','The device has physical damage or unsafe symptoms'],
  related:['setup','mask','cleaning']
 },
 setup:{
  title:'Basic setup workflow',
  aliases:['setup','set up','install','installation','deploy','deployment','assemble','start using','how to use','first time'],
  confidence:'High',
  probable:['New deployment','Device re-setup after transport','User unfamiliar with device parts'],
  answer:`**Service answer — setup workflow**
1. Place the device on a stable, flat surface, slightly below mattress height.
2. Keep it away from water, curtains, heat sources, dust, and anything blocking the air inlet.
3. Connect the power adapter firmly to the device and wall socket.
4. Insert the humidifier chamber if used. Fill only to the maximum line and fill it away from the device.
5. Connect tubing securely to the air outlet.
6. Connect the mask to the tubing and fit the headgear with airflow on.
7. Start therapy and check for leak, abnormal sound, alert message, or loose parts.
8. Brief the user on daily cleaning, water refill, filter check, and when to report issues.

[note]Do not change prescription pressure. Setup support should confirm physical assembly and comfort features only.[/note]`,
  deltas:{
   'dreamstation-1':'For DreamStation 1, slide the humidifier into the side until it is seated. Navigation is through the front dial/buttons.',
   'dreamstation-2':'For DreamStation 2, place the humidifier chamber into the top bay and close it flush. Navigation is through the touchscreen.'
  },
  escalateIf:['Alert remains after setup','Device will not power on','Visible damage, burning smell, liquid exposure, or overheating','User requests pressure change'],
  related:['mask','humidifier','power']
 },
 mask:{
  title:'Mask selection & fit',
  aliases:['mask','leak','leaking','fit','fitting','nasal','pillow','full face','cushion','headgear','which mask','mouth leak','skin mark'],
  confidence:'High',
  probable:['Mask size mismatch','Cushion not seated','Headgear too loose or over-tightened','Mouth leak','Worn cushion'],
  answer:`**Service answer — mask selection & fit**
Mask choice should follow the provider's available mask range, user comfort, leak pattern, and breathing route.

Practical guide:
1. Mostly nose breathing → nasal or nasal-pillow style may be suitable.
2. Mouth breathing or mouth leak → full-face style or clinician/provider review.
3. Claustrophobic or wants minimal contact → nasal-pillow style may be easier.
4. Facial hair, oily skin, or worn cushion can increase leak.

Fit check:
1. Fit the mask while airflow is ON.
2. Ask the user to lie in their normal sleep position.
3. Adjust evenly until leak reduces. Do not over-tighten.
4. Re-seat the cushion before changing size.
5. If leak continues, try another cushion size or mask type.

[danger]Escalate if there is skin injury, pressure sore, persistent high leak, or the user cannot tolerate the mask after refitting.[/danger]`,
  escalateIf:['Skin breakdown or pressure sore','Persistent high leak after refit','Cannot tolerate any suitable mask','Clinical concern affecting therapy adherence'],
  related:['noise','comfort','cleaning']
 },
 noise:{
  title:'Device making sound',
  aliases:['sound','noise','noisy','loud','gurgle','gurgling','whistle','whistling','hiss','hissing','rattle','vibration','grinding','making sound','water sound'],
  confidence:'High',
  probable:['Mask or tube leak','Water condensation in tube','Loose humidifier chamber','Device vibration against table/wall','Filter or inlet obstruction'],
  answer:`**Service answer — device making sound**
I need the sound type to separate normal leak/condensation from possible device fault.`,
  sub:{
   prompt:'What does the sound seem like?',
   options:{
    'Hissing / whistling':`**Likely cause — air leak**
1. Check mask cushion seal with airflow ON.
2. Re-seat the mask instead of only tightening the headgear.
3. Inspect cushion for cracks, oil film, deformation, or wrong size.
4. Confirm both tubing ends are fully connected.
5. Check that the mask vent is clear and not blocked.

[success]Most hissing/whistling cases are mask, cushion, or tubing leak — not the blower itself.[/success]`,
    'Gurgling / water sound':`**Likely cause — condensation / rainout**
1. Stop therapy and disconnect the tube.
2. Drain and dry the tubing.
3. Confirm the humidifier chamber is not overfilled.
4. Reduce humidity gradually or use heated tube settings according to approved workflow.
5. Keep the tube warm and avoid low room temperature directly cooling the tube.

[note]If water entered the device body, stop using it and escalate.[/note]`,
    'Rattle / vibration':`**Likely cause — loose part or surface vibration**
1. Move the device onto a firm, flat surface.
2. Make sure it is not touching the wall, bedside items, or loose cables.
3. Re-seat the humidifier chamber.
4. Check filter cover and tubing connection.
5. Restart and listen again from the device, tube, and mask separately.`,
    'Loud motor / grinding':`**Potential device fault**
1. Stop therapy and inspect the air inlet/filter area.
2. Confirm filter is correctly fitted and not blocked.
3. Check for visible damage, overheating, burning smell, or error message.
4. Restart once only if no unsafe sign is present.

[danger]Escalate if the noise is sudden, grinding, very loud, paired with an alert, burning smell, overheating, or continues after basic checks.[/danger]`
   }
  },
  escalateIf:['Sudden loud motor sound','Grinding noise','Burning smell, overheating, smoke, liquid exposure','Error/alert with noise','Noise persists after leak, water, surface, and filter checks'],
  related:['mask','humidifier','power']
 },
 humidifier:{
  title:'Humidifier, dryness & water',
  aliases:['humidifier','humidity','water','dry mouth','dry nose','dryness','condensation','rainout','rain out','chamber','water chamber','nasal dryness'],
  confidence:'High',
  probable:['Chamber not seated','Low humidity setting','Mask leak causing dryness','Overfilled chamber','Condensation in tube'],
  answer:`**Service answer — humidifier support**
1. Confirm the chamber is correctly inserted and not cracked.
2. Fill only to the maximum line, away from the device.
3. If the user reports dry mouth or dry nose, check mask leak first.
4. Increase humidity gradually according to approved comfort workflow.
5. If there is water in the tube or mask, drain the tube, reduce humidity, and keep the tube warm.
6. Confirm the user empties and dries the chamber daily.

[danger]Escalate if the chamber leaks, water enters the device, heater fault is suspected, or dryness persists after leak and humidifier checks.[/danger]`,
  deltas:{
   'dreamstation-1':'DreamStation 1: remove the side-loading chamber fully before filling, then slide it back until seated.',
   'dreamstation-2':'DreamStation 2: remove the top chamber before filling and dry the base before reinserting.'
  },
  escalateIf:['Water entered device','Cracked or leaking chamber','Heating fault suspected','Dryness persists despite leak and humidity checks'],
  related:['noise','comfort','cleaning']
 },
 comfort:{
  title:'Pressure & comfort',
  aliases:['pressure','too strong','too high','too low','air hunger','comfort','ramp','bloated','bloating','aerophagia','cannot breathe','hard to breathe','waking up'],
  confidence:'Medium',
  probable:['Mask leak distorting pressure feel','Ramp not understood','Exhalation discomfort','Acclimatisation issue','Possible clinical review needed'],
  answer:`**Service answer — pressure & comfort**
1. Clarify what the user feels: too strong, air hunger, bloating, dry mouth, or frequent waking.
2. Check mask leak and tubing connection first.
3. Review comfort features allowed by workflow, such as Ramp and exhalation relief.
4. Confirm the correct tube and mask are attached.
5. Encourage short awake acclimatisation sessions if allowed by the care plan.

[danger]Do not change prescribed pressure. Escalate for chest discomfort, severe breathlessness, dizziness, persistent intolerance, high AHI concern, or any request to modify prescription settings.[/danger]`,
  deltas:{
   'dreamstation-1':'DreamStation 1: comfort features are accessed through dial/button menu navigation.',
   'dreamstation-2':'DreamStation 2: comfort features are accessed from the touchscreen comfort menu.'
  },
  escalateIf:['Chest discomfort, severe breathlessness, dizziness','Persistent intolerance','Request to change pressure prescription','Clinical interpretation needed'],
  related:['mask','humidifier','data']
 },
 power:{
  title:'Power & startup',
  aliases:['power','not turning on','cannot turn on','wont turn on','won\'t turn on','startup','start up','plug','adapter','cable','cord','screen blank','no power'],
  confidence:'High',
  probable:['Loose power adapter','Faulty wall socket','Damaged power cord','Device fault'],
  answer:`**Service answer — power / startup**
1. Test the wall socket with another appliance.
2. Check the power cord at the wall, adapter brick, and device end.
3. Avoid extension leads if possible.
4. Look for screen activity, indicator lights, or alert text.
5. Inspect cord, adapter, and device casing for damage.
6. Try one approved alternate wall socket.

[danger]Escalate immediately for burning smell, overheating, smoke, liquid exposure, damaged cord, cracked casing, or no power after the checks above. Do not open the device.[/danger]`,
  escalateIf:['No power after socket and cable checks','Damaged cord or casing','Burning smell, overheating, smoke, liquid exposure'],
  related:['alerts','noise','setup']
 },
 cleaning:{
  title:'Cleaning & maintenance',
  aliases:['clean','cleaning','maintenance','filter','replace','replacement','wash','hygiene','dirty','dust'],
  confidence:'High',
  probable:['Routine care question','Filter due','Mask cushion contamination','Chamber maintenance issue'],
  answer:`**Service answer — cleaning & maintenance**
Daily:
1. Empty and rinse the water chamber.
2. Let parts air-dry fully before reuse.

Weekly:
1. Hand-wash mask cushion, tubing, and water chamber with mild soap and warm water.
2. Rinse well and air-dry away from direct sunlight.
3. Inspect tubing, cushion, and chamber for cracks or wear.

Filter:
1. Check the filter regularly.
2. Replace disposable filters according to approved schedule.
3. Do not wash disposable ultra-fine filters.

[note]Avoid unapproved ozone/UV cleaners or harsh chemicals unless your approved workflow specifically allows them.[/note]`,
  deltas:{
   'dreamstation-1':'DreamStation 1: reusable blue filter can be rinsed and dried; optional white ultra-fine filter is disposable and should not be washed.',
   'dreamstation-2':'DreamStation 2: single disposable ultra-fine filter should be replaced on schedule and not washed.'
  },
  escalateIf:['Mould, damage, persistent odour, or contaminated parts','Unclear filter type','User reports respiratory symptoms requiring clinical support'],
  related:['mask','humidifier','setup']
 },
 data:{
  title:'App, data & DreamMapper',
  aliases:['dreammapper','app','bluetooth','data','sync','synching','syncing','report','compliance','pairing','connect','connectivity','modem'],
  confidence:'Medium',
  probable:['Bluetooth pairing issue','No internet connection','Data not uploaded after session','Accessory missing on older device','Provider report needed'],
  answer:`**Service answer — app / data / connectivity**
1. Identify the issue: login, Bluetooth pairing, missing usage data, or compliance report.
2. Confirm the device is powered and the therapy session has ended.
3. Keep the phone near the device during pairing.
4. Check phone Bluetooth and internet connection.
5. Re-pair the device if pairing failed.
6. Confirm whether the device model has built-in connectivity or requires an accessory.

[danger]Escalate if a compliance report is urgent, data remains missing after re-pairing, the provider needs therapy interpretation, or account access is blocked.[/danger]`,
  deltas:{
   'dreamstation-1':'DreamStation 1 may require an external modem or Bluetooth accessory for remote connectivity. Confirm the accessory is present.',
   'dreamstation-2':'DreamStation 2 has Bluetooth and may have built-in cellular connectivity depending on model/configuration.'
  },
  escalateIf:['Urgent compliance report needed','Repeated pairing failure','Missing data after normal sync window','Provider therapy interpretation needed'],
  related:['power','setup','comfort']
 },
 alerts:{
  title:'Alerts & error messages',
  aliases:['alert','error','warning','code','message','fault','service required','exclamation'],
  confidence:'Medium',
  probable:['Filter reminder','Humidifier/chamber prompt','Connectivity prompt','Device fault code','Unsupported/unknown code'],
  answer:`**Service answer — alerts & error messages**
1. Read the exact alert text or code.
2. Note when it appears: startup, during therapy, after therapy, or during humidifier use.
3. Check simple prompts first: filter, chamber, tubing, or connectivity reminders.
4. Acknowledge only if the workflow clearly identifies the prompt.
5. Power-cycle once only if the device is otherwise safe.

[danger]Escalate any unknown code, recurring fault, service-required message, or alert with noise, smell, overheating, liquid exposure, or therapy interruption. Do not guess the meaning of a code.[/danger]`,
  escalateIf:['Unknown alert/code','Recurring fault','Service-required message','Alert with unsafe symptom','Therapy interrupted'],
  related:['power','noise','data']
 }
};

const state = {
 role:'field-agent',
 device:null,
 lastIssue:null,
 awaitingSub:null,
 awaitingHelpful:null,
 severity:'Normal',
 signal:'Waiting for user question',
 confidence:'—',
 nextAction:'Pick a device or describe the issue',
 probable:[],
 symptoms:[],
 transcript:[]
};

function escapeHtml(s){return String(s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;');}
function format(s){
 return escapeHtml(s)
  .replace(/\*\*(.+?)\*\*/g,'<b>$1</b>')
  .replace(/\[note\]([\s\S]*?)\[\/note\]/g,'<span class="note">$1</span>')
  .replace(/\[success\]([\s\S]*?)\[\/success\]/g,'<span class="success">$1</span>')
  .replace(/\[danger\]([\s\S]*?)\[\/danger\]/g,'<span class="danger">$1</span>')
  .replace(/\[ai\]([\s\S]*?)\[\/ai\]/g,'$1');
}
function addMsg(text, who){
 const d = document.createElement('div');
 d.className = 'msg ' + who;
 d.innerHTML = format(text);
 chat.appendChild(d);
 chat.scrollTop = chat.scrollHeight;
 state.transcript.push({who,text,at:new Date().toLocaleTimeString()});
 if(state.transcript.length>8) state.transcript.shift();
 updatePanel();
}
function showTyping(){const t=document.createElement('div');t.className='typing';t.id='typing';t.innerHTML='<span></span><span></span><span></span>';chat.appendChild(t);chat.scrollTop=chat.scrollHeight;}
function hideTyping(){const t=document.getElementById('typing'); if(t)t.remove();}
function setChips(list){
 chipsEl.innerHTML='';
 (list||[]).forEach(item=>{
  const label = typeof item === 'string' ? item : item.label;
  const klass = typeof item === 'string' ? '' : (item.className || '');
  const c=document.createElement('button');
  c.type='button';
  c.className='chip ' + klass;
  c.textContent=label;
  c.onclick=()=>handleUser(label);
  chipsEl.appendChild(c);
 });
}
function deviceName(id){return (devices.find(d=>d.id===id)||{}).name || 'the selected device';}
function roleName(){return (roleOptions.find(r=>r.id===state.role)||roleOptions[0]).name;}
function renderDevices(){
 devicesEl.innerHTML = devices.map(d=>`
  <article class="device" data-id="${d.id}">
   <div class="device-visual"><img src="${d.image}" alt="${d.name}" loading="lazy"></div>
   <div class="device-body">
    <div class="device-name">${d.name}</div>
    <div class="device-desc">${d.short}</div>
   </div>
  </article>
 `).join('');
 devicesEl.querySelectorAll('.device').forEach(card=>{
  card.onclick=()=>handleUser('Use ' + devices.find(x=>x.id===card.dataset.id).name);
 });
}
function renderRoles(){
 if(!rolesEl) return;
 rolesEl.innerHTML = roleOptions.map(r=>`
  <button class="role-btn ${state.role===r.id?'active':''}" data-role="${r.id}" type="button">
   <b>${r.name}</b><span>${r.desc}</span>
  </button>
 `).join('');
 rolesEl.querySelectorAll('.role-btn').forEach(btn=>{
  btn.onclick=()=>{
   state.role=btn.dataset.role;
   updatePanel();
   renderRoles();
   setChips(['Device making sound','How to set up device','Which mask should be used?','Escalation criteria']);
  };
 });
}
function renderContext(){
 const bits=[];
 if(state.device) bits.push(`<span class="ctx-pill"><span>Selected device:</span> ${deviceName(state.device)}</span>`);
 ctxEl.innerHTML = bits.join('');
 devicesEl.querySelectorAll('.device').forEach(c=>c.classList.toggle('active', c.dataset.id===state.device));
}
function badge(text, type){return `<span class="badge ${type||''}">${text}</span>`;}
function updatePanel(){
 renderContext();
}
function buildSupportNote(){
 const issue = state.lastIssue && kb[state.lastIssue] ? kb[state.lastIssue] : null;
 const lines = [];
 lines.push('SERVICE HANDOVER NOTE');
 lines.push('Role: ' + roleName());
 lines.push('Device: ' + (state.device ? deviceName(state.device) : 'Not specified'));
 lines.push('Issue: ' + (issue ? issue.title : 'Not detected'));
 lines.push('Severity: ' + (state.severity || 'Normal'));
 lines.push('Signal: ' + (state.signal || 'No signal captured yet'));
 lines.push('KB confidence: ' + (state.confidence || '—'));
 if(state.symptoms.length) lines.push('Captured symptoms: ' + [...new Set(state.symptoms)].join(', '));
 if(state.probable.length) lines.push('Probable cause(s): ' + state.probable.slice(0,4).join('; '));
 if(issue && issue.escalateIf) lines.push('Escalate if: ' + issue.escalateIf.slice(0,4).join('; '));
 const latestUser = [...state.transcript].reverse().find(x=>x.who==='user');
 if(latestUser) lines.push('Latest user message: "' + latestUser.text.replace(/\s+/g,' ').slice(0,180) + '"');
 lines.push('Recommended next action: ' + (state.nextAction || 'Continue triage'));
 return lines.join('\n');
}
function showToast(msg){if(!toast) return; toast.textContent=msg;toast.classList.add('show');setTimeout(()=>toast.classList.remove('show'),1300);}

const copyNoteBtn = document.getElementById('copyNote');
if(copyNoteBtn){
 copyNoteBtn.onclick=async()=>{
  const supportEl=document.getElementById('support');
  if(!supportEl) return;
  try{await navigator.clipboard.writeText(supportEl.value);showToast('Copied');}
  catch(e){supportEl.select();showToast('Select and copy');}
 };
}
const resetCaseBtn = document.getElementById('resetCase');
if(resetCaseBtn){
 resetCaseBtn.onclick=()=>{
  Object.assign(state,{device:null,lastIssue:null,awaitingSub:null,awaitingHelpful:null,severity:'Normal',signal:'Case reset',confidence:'—',nextAction:'Pick a device or describe the issue',probable:[],symptoms:[],transcript:[]});
  chat.innerHTML='';
  boot();
  updatePanel();
 };
}

function normalize(t){
 return t.toLowerCase()
  .replace(/humidi\w*/g,'humidifier')
  .replace(/maek|msak/g,'mask')
  .replace(/presure|pressur\b/g,'pressure')
  .replace(/clenaing|cleanin\b/g,'cleaning')
  .replace(/synching/g,'syncing')
  .trim();
}
function includesAny(t, list){return list.some(w=>t.includes(w));}
function detectDevice(t){
 if(includesAny(t,['dreamstation 1','dreamstation one','ds1','ds 1','station 1'])) return 'dreamstation-1';
 if(includesAny(t,['dreamstation 2','dreamstation two','ds2','ds 2','station 2'])) return 'dreamstation-2';
 return null;
}
function detectRole(t){
 if(includesAny(t,['field agent','technician','deploy','deployment'])) return 'field-agent';
 if(includesAny(t,['sleep consultant','consultant','coach','counsellor','counselor'])) return 'sleep-consultant';
 if(includesAny(t,['patient','user','my machine','my device','i am using'])) return 'end-user';
 return null;
}
function detectIssue(t){
 let best=null, score=0;
 for(const [id,item] of Object.entries(kb)){
  let s=0;
  item.aliases.forEach(a=>{ if(t.includes(a)) s += Math.max(1, a.split(' ').length); });
  if(s>score){best=id;score=s;}
 }
 return best;
}
function detectSeverity(t){
 const critical=['burning smell','smoke','sparks','electric shock','overheating','hot to touch','water entered','liquid entered','cracked','broken casing','damaged cord','chest pain','severe breath','cannot breathe','dizzy','faint','grinding','service required'];
 const watch=['urgent','still not working','still happening','persistent','repeated','recurring','worse','again','failed','does not resolve','no power'];
 if(includesAny(t,critical)) return 'Escalate now';
 if(includesAny(t,watch)) return 'Watch closely';
 return 'Normal';
}
function detectSymptoms(t){
 const map = [
  ['hissing','hissing sound'],['whistling','whistling sound'],['gurgling','gurgling/water sound'],['water','water/condensation'],['rattle','rattle'],['vibration','vibration'],['grinding','grinding motor noise'],['leak','mask/tube leak'],['dry mouth','dry mouth'],['dry nose','dry nose'],['no power','no power'],['not turning on','not turning on'],['sync','data sync'],['bluetooth','Bluetooth'],['pressure','pressure discomfort'],['too strong','pressure too strong'],['alert','alert/error'],['error','alert/error']
 ];
 return map.filter(([k])=>t.includes(k)).map(([,v])=>v);
}

const AFFIRM=['yes','yep','yeah','yup','resolved','fixed','working now','it helped','that helped','solved','good','great','all good','perfect'];
const NEGATE=['no','nope','still','not working','did not work','didn\'t work','doesnt work','doesn\'t work','same','still happening','no luck','not fixed'];

function roleIntro(){
 if(state.role==='field-agent') return 'Operational checks first, then replacement or escalation if needed.';
 if(state.role==='sleep-consultant') return 'Comfort coaching and patient-friendly wording.';
 return 'Simple instructions with clear safety boundaries.';
}
function contextLine(issue){
 return '';
}
function needDeviceNudge(issue){
 state.lastIssue=issue;
 state.confidence=kb[issue].confidence;
 state.nextAction='Confirm device model before model-specific steps';
 return {
  text:`I can help with **${kb[issue].title.toLowerCase()}**. Which device is this for? It lets me give the right physical steps and filter/humidifier details.`,
  chips:['DreamStation 1 Auto CPAP','DreamStation 2 Auto CPAP',{label:'Skip — general steps',className:'secondary'}]
 };
}
function withDeviceDelta(issue, body){
 const item=kb[issue];
 if(item.deltas && state.device && item.deltas[state.device]){
  body += `\n\n[note]${deviceName(state.device)} detail: ${item.deltas[state.device]}[/note]`;
 }
 return body;
}
function topicAnswer(issue){
 const item=kb[issue];
 state.lastIssue=issue;
 state.confidence=item.confidence;
 state.probable=item.probable || [];
 state.signal = item.title;
 state.nextAction = item.sub ? 'Ask one follow-up to identify symptom subtype' : 'Run KB checks, then confirm whether resolved';
 if(item.sub){
  state.awaitingSub=issue;
  return {
   text:`${item.answer}\n\n**Follow-up needed:** ${item.sub.prompt}`,
   chips:Object.keys(item.sub.options).concat([{label:'Not sure',className:'secondary'},{label:'Escalation criteria',className:'danger-chip'}])
  };
 }
 let body = withDeviceDelta(issue,item.answer);
 body += `\n\n**Probable cause to check first:**\n• ${item.probable.slice(0,3).join('\n• ')}`;
 body += `\n\nDid this resolve it?`;
 state.awaitingHelpful=issue;
 const related=(item.related||[]).slice(0,3).map(r=>kb[r]?kb[r].title:r);
 return {text:body, chips:[{label:'Yes, resolved',className:'good-chip'},{label:'No, still an issue',className:'danger-chip'}].concat(related)};
}
function subAnswer(issue, choice){
 const item=kb[issue];
 const keys=Object.keys(item.sub.options);
 const c=normalize(choice);
 const match=keys.find(k=>normalize(k)===c) || keys.find(k=>c.includes(normalize(k).split(' ')[0]));
 if(!match){
  return {text:`No problem. Pick the closest sound type so I can avoid guessing.`, chips:keys.concat([{label:'Escalation criteria',className:'danger-chip'}])};
 }
 state.awaitingSub=null;
 state.awaitingHelpful=issue;
 state.signal = match;
 state.symptoms.push(match);
 state.nextAction='Complete subtype checks, then confirm if resolved';
 let body = item.sub.options[match];
 body = withDeviceDelta(issue, body);
 body += `\n\nDid this resolve it?`;
 return {text:body, chips:[{label:'Yes, resolved',className:'good-chip'},{label:'No, still an issue',className:'danger-chip'},'Try another topic']};
}
function escalationCriteria(){
 state.severity = state.severity==='Normal' ? 'Watch closely' : state.severity;
 state.nextAction='Escalate with structured support if any criterion is met';
 state.confidence='High';
 const issue = state.lastIssue && kb[state.lastIssue] ? kb[state.lastIssue] : null;
 const issueSpecific = issue && issue.escalateIf ? '\n\n**Issue-specific triggers:**\n• ' + issue.escalateIf.join('\n• ') : '';
 return {
  text:`**Escalation criteria — stop self-troubleshooting and route to Philips/provider support**
• Physical damage, cracked casing, damaged cord, burning smell, overheating, smoke, or liquid exposure.
• Water has entered the device body.
• Unknown, recurring, or service-required error code.
• Device will not power on after socket and cord checks.
• Sudden loud motor noise, grinding, or abnormal sound that persists.
• Chest discomfort, severe breathlessness, dizziness, or inability to tolerate therapy.
• Any request to change prescription pressure or interpret therapy results.
• Mask causing skin breakdown, pressure sore, or repeated high leak.
• Urgent compliance/data report need.
• Question is outside the approved knowledge base.${issueSpecific}`,
  chips:['Start over','Try another topic']
 };
}
function createEscalationNote(){
 state.nextAction='Copy support summary and send to support/provider';
 state.severity = state.severity==='Normal' ? 'Watch closely' : state.severity;
 updatePanel();
 return {text:`I created a structured escalation guidance in the support flow. It includes role, device, issue, severity, captured symptoms, probable cause, and the latest user message.\n\n[success]Use the Copy note button when handing over to support or the provider.[/success]`, chips:['Escalation criteria','Start over','Try another topic']};
}
function topicMenu(extra){
 state.nextAction='Select a supported topic';
 return {
  text:(extra?extra+'\n\n':'') + `I can support these service topics for DreamStation 1 and DreamStation 2:\n\n• Setup / deployment\n• Mask choice and leak\n• Device noise\n• Humidifier, water, dryness\n• Pressure comfort / ramp\n• Power and startup\n• Cleaning and filters\n• App, data, DreamMapper\n• Alerts and escalation`,
  chips:['How to set up device','Device making sound','Which mask should be used?','Humidifier issue','Pressure & comfort','Cleaning & maintenance','App / data issue',{label:'Escalation criteria',className:'danger-chip'}]
 };
}
function startResponse(){
 state.nextAction='Ask a service question or select a device';
 return {
  text:`Hi — I’m the **Philips Service Navigator** 👋
I help with **DreamStation 1** and **DreamStation 2** setup, troubleshooting, and escalation.

You can ask naturally, for example:
• “DS2 has a gurgling sound”
• “Which mask should I use?”
• “Device will not power on”
• “Patient says pressure is too strong”`,
  chips:['DreamStation 1 Auto CPAP','DreamStation 2 Auto CPAP','Device making sound','How to set up device','Which mask should be used?']
 };
}
function safetyOverride(t){
 const sev=detectSeverity(t);
 if(sev==='Escalate now'){
  state.severity='Escalate now';
  state.signal='Safety/critical keyword detected';
  state.nextAction='Stop troubleshooting and escalate';
  state.confidence='High';
  return {
   text:`I’m detecting a safety or fault signal in that message. The safe answer is to **stop using the device and escalate** rather than continue chatbot troubleshooting.\n\n[danger]Escalate now if there is smoke, burning smell, overheating, liquid exposure, damaged cord/casing, severe breathlessness, chest discomfort, or a recurring/unknown fault code.[/danger]`,
   chips:[{label:'Show escalation criteria',className:'danger-chip'}]
  };
 }
 return null;
}
function respond(raw){
 const t=normalize(raw);
 const role=detectRole(t); if(role){state.role=role; renderRoles();}
 const dev=detectDevice(t); if(dev){state.device=dev; state.signal='Device selected'; state.nextAction='Ask or continue service topic';}
 state.symptoms.push(...detectSymptoms(t));
 state.symptoms=[...new Set(state.symptoms)].slice(-8);
 const sev=detectSeverity(t); if(sev!=='Normal') state.severity=sev;

 if(/^(hi|hey|hello|yo|start|restart|start over|menu)$/i.test(t) || t==='start service support'){
  if(t.includes('restart') || t.includes('start over')){
   Object.assign(state,{lastIssue:null,awaitingSub:null,awaitingHelpful:null,severity:'Normal',signal:'Case restarted',confidence:'—',nextAction:'Ask a service question or select a device',probable:[],symptoms:[]});
  }
  return startResponse();
 }

 if(includesAny(t,['contact support','route to support','support note'])) return createEscalationNote();
 if(includesAny(t,['escalation criteria','show escalation criteria','when to escalate','escalate instead'])) return escalationCriteria();

 const unsafe=safetyOverride(t); if(unsafe) return unsafe;

 if(dev && !detectIssue(t) && !state.awaitingSub && !state.awaitingHelpful){
  const d=devices.find(x=>x.id===dev);
  state.confidence='High';
  return {text:`Great — using **${deviceName(dev)}**.\n\n${d.notes}\n\nWhat do you need help with?`, chips:['How to set up device','Device making sound','Which mask should be used?','Humidifier issue','Cleaning & maintenance']};
 }

 if(state.awaitingSub){
  if(includesAny(t,['not sure','dont know','don\'t know','unsure'])){
   state.awaitingSub=null;
   state.nextAction='Use broad checks and escalate if unresolved';
   return {text:`No problem. We can run general checks first, then escalate if it persists.`, chips:Object.keys(kb[state.lastIssue].sub.options).concat([{label:'Escalation criteria',className:'danger-chip'}])};
  }
  return subAnswer(state.awaitingSub, raw);
 }

 if(state.awaitingHelpful){
  const issue=state.awaitingHelpful;
  if(AFFIRM.some(w=>t.includes(w))){
   state.awaitingHelpful=null;
   state.severity='Resolved';
   state.signal='User confirmed resolved';
   state.nextAction='Close case or ask next topic';
   return {text:`Glad that sorted it. Anything else?`, chips:(kb[issue].related||[]).slice(0,3).map(r=>kb[r].title).concat([{label:'No, all done',className:'secondary'}])};
  }
  if(NEGATE.some(w=>t.includes(w))){
   state.awaitingHelpful=null;
   state.severity='Watch closely';
   state.signal='KB steps did not resolve issue';
   state.nextAction='Escalate or try issue-specific next topic';
   return {text:`Thanks — since the standard KB steps did not resolve it, the safer path is escalation or a more specific follow-up check.`, chips:[{label:'Show escalation criteria',className:'danger-chip'},'Try another topic']};
  }
  state.awaitingHelpful=null;
 }

 if(includesAny(t,['all done','no all done','that\'s all','thats all','nothing else','no thanks','no thank you'])){
  state.nextAction='Case closed by user';
  return {text:`Done — closing this service flow. Reopen any time you need setup, troubleshooting, or escalation help. 👋`, chips:['Start over']};
 }
 if(includesAny(t,['another topic','different topic','try another','something else','topics'])) return topicMenu('Sure.');
 if(includesAny(t,['skip','general steps','any device']) && state.lastIssue) return topicAnswer(state.lastIssue);

 const issue=detectIssue(t);
 if(issue){
  const needsDevice=['setup','noise','humidifier','comfort','cleaning','data'].includes(issue);
  if(needsDevice && !state.device) return needDeviceNudge(issue);
  return topicAnswer(issue);
 }

 state.confidence='Low';
 state.signal='Unable to confidently match to supported KB';
 state.nextAction='Ask user to choose supported topic or escalate';
 return topicMenu(`I could not confidently match that to a supported service workflow, so I will not guess.`);
}
function handleUser(text){
 text=(text||'').trim(); if(!text) return;
 addMsg(text,'user');
 input.value=''; input.style.height='auto'; setChips([]); showTyping();
 const r=respond(text);
 const delay=Math.min(850,280+r.text.length*1.2);
 setTimeout(()=>{hideTyping(); addMsg(r.text,'bot'); setChips(r.chips); updatePanel();}, delay);
}
sendBtn.onclick=()=>handleUser(input.value);
input.addEventListener('keydown',e=>{if(e.key==='Enter' && !e.shiftKey){e.preventDefault();handleUser(input.value);}});
input.addEventListener('input',()=>{input.style.height='auto';input.style.height=Math.min(input.scrollHeight,112)+'px';});
function boot(){
 renderDevices(); renderRoles(); updatePanel();
 setTimeout(()=>{const r=startResponse(); addMsg(r.text,'bot'); setChips(r.chips); updatePanel();},180);
}
window.addEventListener('load',boot);
</script>
</body>
</html>
