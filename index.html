<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>Philips Navigator — Service Support Chatbot</title>
<style>
 :root{
  --bg:#eef3f8;
  --panel:#ffffff;
  --brand:#0281c3;
  --brand-dark:#026da5;
  --brand-soft:#e6f5fc;
  --user:#0281c3;
  --bot:#f8fafc;
  --text:#111827;
  --muted:#667085;
  --line:#e5e7eb;
  --good:#0f766e;
  --good-bg:#ecfdf5;
  --warn:#b45309;
  --warn-bg:#fffbeb;
  --danger:#b42318;
  --danger-bg:#fff1f3;
  --shadow:0 20px 55px rgba(2,129,195,.20);
 }
 *{box-sizing:border-box}
 body{
  margin:0;
  font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",Roboto,Helvetica,Arial,sans-serif;
  background:linear-gradient(135deg,#dfeaf2,#eef3f8);
  min-height:100vh;
  color:var(--text);
  display:flex;
  align-items:center;
  justify-content:center;
  padding:16px;
 }
 .app{
  width:100%;
  max-width:720px;
  height:min(920px,95vh);
  background:var(--panel);
  border-radius:24px;
  box-shadow:var(--shadow);
  display:flex;
  flex-direction:column;
  overflow:hidden;
 }
 header{
  background:linear-gradient(135deg,var(--brand),var(--brand-dark));
  color:#fff;
  padding:16px 18px 16px;
 }
 .topbar{display:flex;align-items:center;gap:12px}
 .logo{
  width:64px;height:44px;border-radius:0;background:transparent;
  display:flex;align-items:center;justify-content:center;flex-shrink:0;
  padding:0;overflow:hidden;
 }
 .logo img{width:100%;height:100%;object-fit:contain;display:block}
 header h1{font-size:17px;margin:0;font-weight:800;letter-spacing:.2px}
 header p{margin:2px 0 0;font-size:12px;opacity:.86}
 .status{margin-left:auto;display:flex;align-items:center;gap:6px;font-size:11px;opacity:.9}
 .dot{width:8px;height:8px;border-radius:50%;background:#7CFFB2;box-shadow:0 0 8px #7CFFB2}

 .scope{
  background:#fff;
  border-bottom:1px solid var(--line);
  padding:12px 14px 10px;
 }
 .scope-head{display:flex;align-items:center;justify-content:space-between;margin-bottom:10px;gap:12px}
 .scope h2{margin:0;font-size:13px;color:#101828}
 .scope small{color:var(--muted);font-size:11px}
 .devices{display:flex;gap:10px;overflow-x:auto;padding-bottom:2px;scrollbar-width:thin}
 .device{
  min-width:210px;
  border:1px solid var(--line);
  border-radius:16px;
  background:#fff;
  overflow:hidden;
  cursor:pointer;
  transition:.15s;
 }
 .device:hover{transform:translateY(-1px);box-shadow:0 8px 20px rgba(15,23,42,.08)}
 .device-visual{
  height:96px;
  background:#fff;
  display:flex;
  align-items:center;
  justify-content:center;
  overflow:hidden;
 }
 .device-visual img{width:100%;height:100%;object-fit:cover;display:block}
 .device-body{padding:10px}
 .device-name{font-size:12.5px;font-weight:800;line-height:1.25;margin-bottom:4px}
 .device-desc{font-size:10.5px;color:var(--muted);line-height:1.35;min-height:42px;overflow:hidden}
 .tag{display:inline-block;font-size:10px;font-weight:800;margin-top:8px;color:var(--good);background:var(--good-bg);padding:4px 8px;border-radius:999px}

 #chat{
  flex:1;
  overflow-y:auto;
  padding:16px;
  display:flex;
  flex-direction:column;
  gap:12px;
  background:var(--bg);
 }
 .msg{
  max-width:88%;
  padding:11px 14px;
  border-radius:17px;
  font-size:14.3px;
  line-height:1.5;
  white-space:pre-wrap;
  word-wrap:break-word;
  animation:pop .18s ease;
 }
 @keyframes pop{from{opacity:0;transform:translateY(6px)}to{opacity:1;transform:none}}
 .bot{align-self:flex-start;background:var(--bot);color:var(--text);border:1px solid #edf2f7;border-bottom-left-radius:5px}
 .user{align-self:flex-end;background:var(--user);color:#fff;border-bottom-right-radius:5px}
 .msg b{font-weight:800}
 .note{display:block;background:var(--warn-bg);border:1px solid #fed7aa;color:#92400e;border-radius:10px;padding:9px 10px;margin-top:7px;font-size:12px;line-height:1.45}
 .success{display:block;background:var(--good-bg);border:1px solid #99f6e4;color:#115e59;border-radius:10px;padding:9px 10px;margin-top:7px;font-size:12px;line-height:1.45}
 .danger{display:block;background:var(--danger-bg);border:1px solid #fda29b;color:var(--danger);border-radius:10px;padding:9px 10px;margin-top:7px;font-size:12px;line-height:1.45}

 .chips{display:flex;flex-wrap:wrap;gap:8px;padding:0 16px 8px;background:var(--bg)}
 .chip{
  background:#fff;border:1px solid var(--brand);color:var(--brand-dark);
  padding:7px 12px;border-radius:20px;font-size:12.3px;cursor:pointer;transition:.15s;font-weight:700;
 }
 .chip:hover{background:var(--brand);color:#fff}
 .chip.secondary{border-color:#d0d5dd;color:#344054}
 .chip.secondary:hover{background:#344054;color:#fff}
 .chip.danger-chip{border-color:#f04438;color:#b42318}
 .chip.danger-chip:hover{background:#b42318;color:#fff}

 .typing{align-self:flex-start;background:var(--bot);padding:13px 16px;border-radius:16px;border-bottom-left-radius:5px;display:flex;gap:4px;border:1px solid #edf2f7}
 .typing span{width:7px;height:7px;background:#9bb0bd;border-radius:50%;animation:bounce 1.2s infinite}
 .typing span:nth-child(2){animation-delay:.2s}.typing span:nth-child(3){animation-delay:.4s}
 @keyframes bounce{0%,60%,100%{transform:translateY(0);opacity:.5}30%{transform:translateY(-5px);opacity:1}}

 footer{padding:12px;border-top:1px solid var(--line);background:#fff}
 .inputbar{display:flex;gap:8px;align-items:flex-end}
 #input{
  flex:1;border:1px solid var(--line);border-radius:22px;padding:11px 15px;font-size:14.5px;
  resize:none;max-height:110px;outline:none;font-family:inherit;line-height:1.4;
 }
 #input:focus{border-color:var(--brand)}
 #send{
  background:var(--brand);color:#fff;border:none;width:44px;height:44px;border-radius:50%;
  font-size:19px;cursor:pointer;flex-shrink:0;transition:.15s;display:flex;align-items:center;justify-content:center;
 }
 #send:hover{background:var(--brand-dark)}
 .disclaimer{font-size:10.5px;color:var(--muted);text-align:center;margin-top:8px;line-height:1.4}
</style>
</head>
<body>
<div class="app">
 <header>
  <div class="topbar">
   <div class="logo"><img src="https://kreafolk.com/cdn/shop/articles/philips-logo-design-history-and-evolution-kreafolk_f1fc2da1-f530-4f3c-b656-b0bd1bd55a23.jpg?v=1771570750&width=2048" alt="Philips logo"></div>
   <div>
    <h1>Philips Service Navigator</h1>
    <p>CPAP deployment, setup & troubleshooting assistant</p>
   </div>
   <div class="status"><span class="dot"></span>Service mode</div>
  </div>
 </header>

 <section class="scope">
  <div class="scope-head">
   <h2>Know more about</h2>
   <small>Tap a device to begin</small>
  </div>
  <div class="devices" id="devices"></div>
 </section>

 <div id="chat"></div>
 <div class="chips" id="chips"></div>

 <footer>
  <div class="inputbar">
   <textarea id="input" rows="1" placeholder="Ask: device making sound, how to set up, which mask, humidifier issue…"></textarea>
   <button id="send" title="Send">➤</button>
  </div>
  <div class="disclaimer">Answers are grounded in approved Philips manuals, service workflows, and escalation SOPs.</div>
 </footer>
</div>

<script>
const chat = document.getElementById('chat');
const chipsEl = document.getElementById('chips');
const input = document.getElementById('input');
const sendBtn = document.getElementById('send');
const devicesEl = document.getElementById('devices');

/*
  SERVICE KNOWLEDGE BASE — approved Philips service content.
  Current coverage: DreamStation 1 Auto CPAP and DreamStation 2 Auto CPAP.
*/
const devices = [
 {
  id:'dreamstation-1',
  image:'https://www.philips.com.sg/c-dam/b2c/master/experience/hs/sleep-apnea-therapy/sleep-apnea-machines/dreamstation-intro.jpg',
  name:'DreamStation 1 Auto CPAP',
  short:'Setup, mask fit, humidifier, tubing, device noise, leak, and basic usage support.',
  tag:'Supported device'
 },
 {
  id:'dreamstation-2',
  image:'https://images.philips.com/is/image/philipsconsumer/49159a1299154c0ebe37ac62013820b0?$jpglarge$&wid=420&hei=360',
  name:'DreamStation 2 Auto CPAP',
  short:'Auto CPAP setup, comfort settings, mask/tube checks, humidifier, alerts, and escalation.',
  tag:'Supported device'
 }
];

const state = {
 device:null,
 issueType:null,
 confidence:0,
 answered:false,
 escalated:false
};

const issueTypes = {
 setup:'Setup guidance',
 mask:'Mask / fit / leak',
 noise:'Device making sound',
 humidifier:'Humidifier / water / dryness',
 comfort:'Pressure / comfort issue',
 power:'Power / startup issue',
 cleaning:'Cleaning / maintenance',
 data:'App / data / DreamMapper',
 escalation:'Escalation required'
};

const kb = {
 setup: {
  title:'Basic setup workflow',
  answer:`**Service answer — setup workflow**
1. Place the CPAP device on a stable, flat surface near the bed.
2. Connect the power supply firmly to the device and wall socket.
3. Attach the tubing securely to the air outlet.
4. Connect the mask to the tubing.
5. If using humidification, fill the water chamber only up to the marked maximum line.
6. Put on the mask and check fit before starting therapy.
7. Start airflow and check for obvious air leak, loose tubing, abnormal sound, or error message.
8. Confirm the patient understands cleaning, daily use, and when to report issues.
[note]Use only the approved Philips manual/workflow as the final source. Do not invent pressure settings, clinical settings, or prescription changes.[/note]`,
  escalate:false
 },
 mask: {
  title:'Mask selection / mask fit',
  answer:`**Service answer — mask guidance**
Mask choice should be based on breathing route, comfort, leak, facial fit, and clinician/provider recommendation.

Practical guide:
1. If the user breathes mainly through the nose, consider nasal or nasal pillow style.
2. If the user breathes through the mouth or has mouth leak, consider full-face style or clinician review.
3. Check that cushion size fits the face without over-tightening.
4. Re-seat the mask while airflow is on.
5. Check tubing connection and cushion seal.
6. If leak continues, try another size/style or escalate to mask fitting support.
[danger]Escalate if there is skin injury, pressure sore, severe discomfort, repeated high leak, or the user cannot tolerate the mask after fitting steps.[/danger]`,
  escalate:true
 },
 noise: {
  title:'Device making sound',
  answer:`**Service answer — device making sound**
First identify the sound: air leak, vibration, water/gurgling, fan/motor sound, or alarm/error.

Practical checks:
1. Check mask seal. A leak can sound like the machine is noisy.
2. Check tubing connection at both device and mask side.
3. Check if tubing has water inside. Drain and dry if there is condensation.
4. Make sure the device is on a flat, stable surface and not touching the wall or loose objects.
5. Check water chamber is inserted properly and not overfilled.
6. Restart the device and observe whether the sound continues.
[danger]Escalate if sound is sudden, loud, burning/electrical smell, device damage, repeated error message, water entered the device, or noise continues after basic checks.[/danger]`,
  escalate:true
 },
 humidifier: {
  title:'Humidifier / dryness / water issue',
  answer:`**Service answer — humidifier support**
1. Confirm the water chamber is installed correctly.
2. Check water is below the maximum fill line.
3. Use the correct water type according to the approved manual/local workflow.
4. If dry mouth/nose occurs, check mask leak first because leak can worsen dryness.
5. Check tubing for condensation or water pooling.
6. Confirm the patient knows how to empty, clean, and refill the chamber.
[danger]Escalate if water has entered the machine, chamber is cracked/leaking, heating issue is suspected, or dryness continues despite leak and humidifier checks.[/danger]`,
  escalate:true
 },
 comfort: {
  title:'Pressure / comfort issue',
  answer:`**Service answer — pressure discomfort**
1. Ask what the patient feels: too much pressure, air hunger, bloating, dry mouth, or waking up.
2. Check mask leak and fit first.
3. Confirm ramp/comfort features according to approved Philips workflow.
4. Confirm tubing and mask are connected correctly.
5. Encourage short acclimatisation while awake if allowed by the care workflow.
[danger]Do not change prescription pressure unless authorised. Escalate to clinician/provider if pressure intolerance persists, AHI remains high, patient has chest discomfort, severe breathlessness, or therapy cannot be used.[/danger]`,
  escalate:true
 },
 power: {
  title:'Power / startup issue',
  answer:`**Service answer — power/startup issue**
1. Check wall socket and power adapter connection.
2. Check cable is firmly connected to the device.
3. Try another approved wall socket.
4. Look for error message or indicator light.
5. Check for visible cable or device damage.
[danger]Escalate immediately if there is burning smell, overheating, liquid exposure, damaged cable, cracked device, or device does not power on after basic checks.[/danger]`,
  escalate:true
 },
 cleaning: {
  title:'Cleaning / maintenance',
  answer:`**Service answer — cleaning and maintenance**
1. Explain routine cleaning based on approved manual/workflow.
2. Mask cushion should be cleaned regularly because oil and dirt can cause leak.
3. Tubing and humidifier chamber should be cleaned/dried according to manual instructions.
4. Check replacement schedule for mask cushion, filter, tubing, and chamber.
5. Do not use harsh chemicals unless explicitly approved by the manual/workflow.
[note]Follow the exact Philips-approved cleaning frequency and replacement intervals from the product manuals.[/note]`,
  escalate:false
 },
 data: {
  title:'DreamMapper / data / usage issue',
  answer:`**Service answer — app/data issue**
1. Confirm whether the issue is app login, Bluetooth pairing, missing usage data, or provider data review.
2. Confirm device is powered and therapy session has ended before expecting data sync.
3. Check phone Bluetooth/internet if app sync is involved.
4. Ask whether the device screen shows any error or connectivity alert.
5. If data is needed for clinical decision-making, escalate to provider support.
[danger]Escalate if compliance report is required urgently, data remains missing, pairing repeatedly fails, or the patient/provider needs therapy interpretation.[/danger]`,
  escalate:true
 }
};

const has = (t,...words)=>words.some(w=>t.includes(w));

function escapeHtml(s){return String(s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;');}
function format(s){
 return escapeHtml(s)
  .replace(/\*\*(.+?)\*\*/g,'<b>$1</b>')
  .replace(/\[note\]([\s\S]*?)\[\/note\]/g,'<span class="note">$1</span>')
  .replace(/\[success\]([\s\S]*?)\[\/success\]/g,'<span class="success">$1</span>')
  .replace(/\[danger\]([\s\S]*?)\[\/danger\]/g,'<span class="danger">$1</span>');
}
function addMsg(text, who){
 const d = document.createElement('div');
 d.className = 'msg ' + who;
 d.innerHTML = format(text);
 chat.appendChild(d);
 chat.scrollTop = chat.scrollHeight;
}
function showTyping(){
 const t = document.createElement('div');
 t.className='typing'; t.id='typing';
 t.innerHTML='<span></span><span></span><span></span>';
 chat.appendChild(t); chat.scrollTop=chat.scrollHeight;
}
function hideTyping(){const t=document.getElementById('typing'); if(t)t.remove();}
function setChips(list){
 chipsEl.innerHTML='';
 (list||[]).forEach(item=>{
  const label = typeof item === 'string' ? item : item.label;
  const klass = typeof item === 'string' ? '' : (item.className || '');
  const c=document.createElement('button');
  c.type='button';
  c.className='chip ' + klass;
  c.textContent=label;
  c.onclick=()=>handleUser(label);
  chipsEl.appendChild(c);
 });
}
function renderDevices(){
 devicesEl.innerHTML = devices.map(d=>`
  <article class="device" data-id="${d.id}">
   <div class="device-visual"><img src="${d.image}" alt="${d.name}" loading="lazy"></div>
   <div class="device-body">
    <div class="device-name">${d.name}</div>
    <div class="device-desc">${d.short}</div>
    <span class="tag">${d.tag}</span>
   </div>
  </article>
 `).join('');
 devicesEl.querySelectorAll('.device').forEach(card=>{
  card.onclick = () => {
   const d = devices.find(x=>x.id === card.dataset.id);
   handleUser('Use ' + d.name);
  };
 });
}
function detectDevice(t){
 if(has(t,'dreamstation 1','dreamstation one','ds1','station 1')) return 'dreamstation-1';
 if(has(t,'dreamstation 2','dreamstation two','ds2','station 2')) return 'dreamstation-2';
 return state.device;
}
function detectIssue(t){
 if(has(t,'setup','set up','install','deployment','deploy','start using','how to use')) return 'setup';
 if(has(t,'mask','leak','fit','fitting','nasal','pillow','full face','which mask')) return 'mask';
 if(has(t,'sound','noise','noisy','loud','gurgle','whistle','vibration','making sound')) return 'noise';
 if(has(t,'humidifier','water','dry mouth','dry nose','condensation','rainout','rain out','chamber')) return 'humidifier';
 if(has(t,'pressure','too strong','too high','too low','air hunger','comfort','ramp','bloated','bloating')) return 'comfort';
 if(has(t,'power','not turning on','cannot turn on','startup','start up','plug','adapter','cable')) return 'power';
 if(has(t,'clean','cleaning','maintenance','filter','replace','replacement','wash')) return 'cleaning';
 if(has(t,'dreammapper','app','bluetooth','data','sync','report','compliance')) return 'data';
 if(has(t,'escalate','urgent','danger','broken','damaged','burning','smell','smoke','water entered','electrical')) return 'escalation';
 return null;
}
function deviceName(id){return (devices.find(d=>d.id===id)||{}).name || 'selected Philips device';}
function startResponse(){
 return {
  text:`Hi, I am **Philips Service Navigator**.

I am a service support assistant for:
• **DreamStation 1 Auto CPAP**
• **DreamStation 2 Auto CPAP**

I can help with setup guidance, which mask to use, device making sound, humidifier/water issues, basic troubleshooting, and when to escalate.

[note]I answer only from the approved Philips product/service knowledge base. If a safe answer is not available, I escalate instead of guessing.[/note]`,
  chips:['DreamStation 1 Auto CPAP','DreamStation 2 Auto CPAP','Device making sound','How to set up device','Which mask should be used?']
 };
}
function answerFromKb(issue, device){
 const item = kb[issue];
 if(!item){
  state.escalated = true;
  state.answered = true;
  return {
   text:`I do not have a safe answer in the current Philips knowledge base.

[danger]Escalate to Philips/service provider support. Do not guess, change device settings, or provide clinical advice outside the approved workflow.[/danger]

Suggested escalation note:
• Device: ${device ? deviceName(device) : 'Not specified'}
• User question: unclear / not covered in current KB
• Action requested: confirm correct Philips workflow and service resolution`,
   chips:['Start service support','Device making sound','How to set up device']
  };
 }
 state.issueType = issue;
 state.confidence = 1;
 state.answered = true;
 state.escalated = !!item.escalate;
 return {
  text:`Device: **${device ? deviceName(device) : 'Not specified yet'}**
Issue matched: **${item.title}**

${item.answer}`,
  chips:[
   'Device making sound',
   'How to set up device',
   'Which mask should be used?',
   {label:'Escalation criteria', className:'danger-chip'}
  ]
 };
}
function escalationCriteria(){
 state.issueType = 'escalation';
 state.answered = true;
 state.escalated = true;
 return {
  text:`**Escalation criteria**

Escalate instead of continuing chatbot troubleshooting when:
• Device has physical damage, cracked casing, damaged cable, burning smell, overheating, smoke, or liquid exposure
• Water entered the CPAP device
• Error messages persist after basic workflow checks
• Machine will not power on after socket/cable checks
• Noise is sudden, loud, abnormal, or continues after leak/tube/chamber checks
• Patient has chest discomfort, severe breathlessness, dizziness, or cannot tolerate therapy
• Pressure settings or prescription changes are requested
• Mask causes skin breakdown, pressure sore, or repeated high leak
• App/data issue affects urgent compliance or clinical review
• Question is not covered by the approved Philips KB

[danger]Rule: if no safe answer exists in the KB, answer with escalation. Do not hallucinate service steps.[/danger]`,
  chips:['Start service support','Device making sound','How to set up device']
 };
}
function respond(raw){
 const t = raw.toLowerCase().trim();
 if(/^(hi|hey|hello|yo|start|restart|start service support)\b/.test(t)){
  Object.assign(state,{device:null,issueType:null,confidence:0,answered:false,escalated:false});
  return startResponse();
 }
 const detectedDevice = detectDevice(t);
 if(detectedDevice){state.device = detectedDevice;}

 if(has(t,'escalation criteria','when to escalate','escalate issue','escalate')) return escalationCriteria();

 const issue = detectIssue(t);
 if(issue === 'escalation') return escalationCriteria();
 if(issue) return answerFromKb(issue, state.device);

 if(detectedDevice){
  return {
   text:`Selected device: **${deviceName(detectedDevice)}**

What service issue do you want to check?`,
   chips:['Device making sound','How to set up device','Which mask should be used?','Humidifier issue','Pressure feels too strong']
  };
 }

 return {
  text:`I understood the question, but I cannot safely match it to an approved Philips service workflow yet.

Please choose the closest issue type, or I will escalate if it is not covered.

[note]I first refine the question, then search the Philips KB, then answer only from approved content.[/note]`,
  chips:['DreamStation 1 Auto CPAP','DreamStation 2 Auto CPAP','Device making sound','How to set up device','Escalation criteria']
 };
}
function handleUser(text){
 text = (text||'').trim();
 if(!text) return;
 addMsg(text,'user');
 input.value='';
 input.style.height='auto';
 setChips([]);
 showTyping();
 const r = respond(text);
 const delay = Math.min(900, 250 + r.text.length*2);
 setTimeout(()=>{
  hideTyping();
  addMsg(r.text,'bot');
  setChips(r.chips);
 }, delay);
}
sendBtn.onclick=()=>handleUser(input.value);
input.addEventListener('keydown',e=>{
 if(e.key==='Enter' && !e.shiftKey){e.preventDefault();handleUser(input.value);}
});
input.addEventListener('input',()=>{
 input.style.height='auto';
 input.style.height=Math.min(input.scrollHeight,110)+'px';
});
window.addEventListener('load',()=>{
 renderDevices();
 setTimeout(()=>{
  addMsg(`Hi — I am **Philips Service Navigator**.

I help field agents, sleep consultants, and users with practical service questions for DreamStation 1 Auto CPAP and DreamStation 2 Auto CPAP.

Try asking: **device making sound**, **how to set up device**, or **which mask should be used?**`,'bot');
  setChips(['Start service support','Device making sound','How to set up device','Which mask should be used?','Escalation criteria']);
 },300);
});
</script>
</body>
</html>
